default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: postgres
  password: B1983ball#



development:
  <<: *default
  database: mybasecamp2_development


test:
  <<: *default
  database: mybasecamp2_test

production:
  primary: &primary_production
    <<: *default
    database: mybasecamp2_production
    username: mybasecamp2
    password: <%= ENV["MYBASECAMP2_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: mybasecamp2_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: mybasecamp2_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: mybasecamp2_production_cable
    migrations_paths: db/cable_migrate
